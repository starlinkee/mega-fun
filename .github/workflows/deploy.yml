name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/mega-fun
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            python3 init_db.py
            sudo systemctl restart mega-fun
            grep -v '^#' /opt/mega-fun/deploy/crontab | grep -v '^$' | crontab -
            sudo cp /opt/mega-fun/deploy/mega-fun-datasette.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable mega-fun-datasette
            sudo systemctl restart mega-fun-datasette

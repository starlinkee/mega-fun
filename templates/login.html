<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega-Fun - Logowanie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .login-card h1 {
            color: #e94560;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .login-card .subtitle {
            color: #8892b0;
            margin-bottom: 1.5rem;
        }
        .login-card label {
            color: #ccd6f6;
        }
        .login-card .form-control {
            background: #0f3460;
            border: 1px solid #1a1a4e;
            color: #fff;
        }
        .login-card .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233, 69, 96, 0.25);
            background: #0f3460;
            color: #fff;
        }
        .btn-login {
            background: #e94560;
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.6rem;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-login:hover {
            background: #c73652;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="text-center">Mega-Fun</h1>
        <p class="subtitle text-center">Podaj haslo, aby kontynuowac</p>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="mb-3">
                <label for="password" class="form-label">Haslo</label>
                <input type="password" class="form-control" id="password" name="password" autofocus required>
            </div>
            <button type="submit" class="btn btn-login">Wejdz</button>
        </form>
    </div>
</body>
</html>

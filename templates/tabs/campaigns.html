{% extends "base.html" %}
{% block content %}
<h4>Kampanie</h4>

<!-- Formularz tworzenia kampanii -->
<div class="card mb-4">
    <div class="card-header">Nowa kampania</div>
    <div class="card-body">
        <form id="campaignForm">
            <div class="mb-3">
                <label class="form-label">Nazwa kampanii</label>
                <input type="text" class="form-control" name="name" placeholder="np. Oferta wakacyjna 2026" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tytuł maila (Subject)</label>
                <input type="text" class="form-control" name="subject" placeholder="np. Specjalna oferta dla Twojej firmy" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Treść maila</label>
                <textarea class="form-control" name="body" rows="8" placeholder="Treść wiadomości email..." required></textarea>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Kraj <small class="text-muted">(opcjonalnie)</small></label>
                    <select class="form-select" name="target_country" id="tsTargetCountry">
                        <option value="">Wszystkie kraje</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Miasto <small class="text-muted">(opcjonalnie)</small></label>
                    <select class="form-select" name="target_city" id="tsTargetCity">
                        <option value="">Wszystkie miasta</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Kategoria biznesu <small class="text-muted">(opcjonalnie)</small></label>
                    <select class="form-select" name="target_category" id="tsTargetCategory">
                        <option value="">Wszystkie kategorie</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-success" id="createBtn">Utwórz i uruchom kampanię</button>
            <span class="ms-2" id="campaignStatus"></span>
        </form>
    </div>
</div>

<!-- Lista kampanii -->
<div class="card">
    <div class="card-header" id="campaignsCount">Kampanie</div>
    <div class="card-body p-0">
        <table class="table table-striped table-sm mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nazwa</th>
                    <th>Temat</th>
                    <th>Targetowanie</th>
                    <th>Status</th>
                    <th>Postęp</th>
                    <th>Utworzono</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody id="campaignsTableBody">
                <tr><td colspan="8" class="text-center text-muted">Ładowanie...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Searchable dropdowns
const tsTargetCategory = new TomSelect('#tsTargetCategory', { allowEmptyOption: true, maxOptions: 5000 });
const tsTargetCountry  = new TomSelect('#tsTargetCountry',  { allowEmptyOption: true, maxOptions: 5000 });
const tsTargetCity     = new TomSelect('#tsTargetCity',     { allowEmptyOption: true, maxOptions: 5000 });

fetch('/api/businesses?per_page=1&page=1')
    .then(r => r.json())
    .then(data => {
        (data.countries  || []).forEach(c => { if (c) tsTargetCountry.addOption({value: c, text: c}); });
        (data.cities     || []).forEach(c => { if (c) tsTargetCity.addOption({value: c, text: c}); });
        (data.categories || []).forEach(c => { if (c) tsTargetCategory.addOption({value: c, text: c}); });
    });

function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

function showStatus(el, message, type) {
    if (type === 'loading') {
        el.innerHTML = '<span class="text-success"><span class="spinner-border spinner-border-sm"></span> <strong>' + message + '</strong></span>';
    } else if (type === 'success') {
        el.innerHTML = '<span class="text-success"><strong>' + message + '</strong></span>';
        setTimeout(() => { el.innerHTML = ''; }, 4000);
    } else if (type === 'error') {
        el.innerHTML = '<span class="text-danger"><strong>' + message + '</strong></span>';
        setTimeout(() => { el.innerHTML = ''; }, 5000);
    }
}

// ===================== LOAD CAMPAIGNS =====================

function loadCampaigns() {
    fetch('/api/campaigns')
        .then(r => r.json())
        .then(data => {
            const campaigns = data.campaigns || [];
            document.getElementById('campaignsCount').textContent = `Kampanie (${campaigns.length})`;
            const tbody = document.getElementById('campaignsTableBody');

            if (!campaigns.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Brak kampanii</td></tr>';
                return;
            }

            tbody.innerHTML = campaigns.map(c => {
                // Targetowanie
                const parts = [];
                if (c.target_country) parts.push(`<small>${esc(c.target_country)}</small>`);
                if (c.target_city)    parts.push(`<small>${esc(c.target_city)}</small>`);
                if (c.target_category) parts.push(`<small>${esc(c.target_category)}</small>`);
                const targeting = parts.length ? parts.join(', ') : '<small class="text-muted">Wszystkie</small>';

                // Status badge
                let badge = '';
                if      (c.status === 'active')  badge = '<span class="badge bg-success">Aktywna</span>';
                else if (c.status === 'queued')  badge = '<span class="badge bg-info">W kolejce</span>';
                else if (c.status === 'done')    badge = '<span class="badge bg-primary">Zakończona</span>';
                else if (c.status === 'stopped') badge = '<span class="badge bg-warning">Zatrzymana</span>';
                else badge = `<span class="badge bg-secondary">${esc(c.status)}</span>`;

                // Postęp
                let progress = `<span class="text-success">${c.sent}</span> / <span>${c.total}</span>`;
                if (c.failed > 0) progress += ` (<span class="text-danger">${c.failed} błędów</span>)`;
                if (c.total > 0) {
                    const sentPct   = Math.round(c.sent   * 100 / c.total);
                    const failedPct = Math.round(c.failed * 100 / c.total);
                    progress += `<div class="progress mt-1" style="height:4px;">
                        <div class="progress-bar bg-success" style="width:${sentPct}%"></div>
                        <div class="progress-bar bg-danger"  style="width:${failedPct}%"></div>
                    </div>`;
                }

                // Akcje
                let actions = '';
                if (c.status === 'active' || c.status === 'queued') {
                    actions += `<button class="btn btn-warning btn-sm" onclick="stopCampaign(${c.id}, this)">Stop</button> `;
                } else if (c.status === 'stopped') {
                    actions += `<button class="btn btn-success btn-sm" onclick="resumeCampaign(${c.id}, this)">Wznów</button> `;
                }
                actions += `<button class="btn btn-danger btn-sm" onclick="deleteCampaign(${c.id}, this)">Usuń</button>`;

                return `<tr id="campaign-row-${c.id}">
                    <td>${c.id}</td>
                    <td>${esc(c.name)}</td>
                    <td>${esc(c.subject)}</td>
                    <td>${targeting}</td>
                    <td>${badge}</td>
                    <td>${progress}</td>
                    <td>${c.created_at || ''}</td>
                    <td>${actions}</td>
                </tr>`;
            }).join('');
        });
}

// ===================== FORM =====================

document.getElementById('campaignForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const form = this;
    const btn = document.getElementById('createBtn');
    const status = document.getElementById('campaignStatus');

    btn.disabled = true;
    showStatus(status, 'Tworzenie kampanii...', 'loading');

    fetch('/campaigns/create', { method: 'POST', body: new FormData(form) })
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            if (data.error) {
                showStatus(status, data.error, 'error');
            } else {
                var msg = 'Kampania utworzona! Zakolejkowano ' + data.emails_queued + ' emaili.';
                if (data.status === 'queued') msg += ' (W kolejce — inna kampania jest aktywna)';
                showStatus(status, msg, 'success');
                loadCampaigns();
            }
        })
        .catch(err => {
            btn.disabled = false;
            showStatus(status, 'Błąd: ' + err.message, 'error');
        });
});

function stopCampaign(id, btn) {
    if (!confirm('Zatrzymać kampanię?')) return;
    btn.disabled = true;
    fetch('/campaigns/' + id + '/stop', { method: 'POST' })
        .then(r => r.json())
        .then(() => loadCampaigns())
        .catch(err => { btn.disabled = false; alert('Błąd: ' + err.message); });
}

function resumeCampaign(id, btn) {
    btn.disabled = true;
    fetch('/campaigns/' + id + '/resume', { method: 'POST' })
        .then(r => r.json())
        .then(() => loadCampaigns())
        .catch(err => { btn.disabled = false; alert('Błąd: ' + err.message); });
}

function deleteCampaign(id, btn) {
    if (!confirm('Usunąć kampanię? Wszystkie dane wysyłki zostaną usunięte.')) return;
    btn.disabled = true;
    fetch('/campaigns/' + id + '/delete', { method: 'POST' })
        .then(r => r.json())
        .then(() => {
            const row = document.getElementById('campaign-row-' + id);
            row.style.backgroundColor = 'rgba(25, 135, 84, 0.15)';
            row.querySelector('td:last-child').innerHTML = '<span class="text-success"><strong>Usunięto!</strong></span>';
            setTimeout(() => loadCampaigns(), 1500);
        })
        .catch(err => { btn.disabled = false; alert('Błąd: ' + err.message); });
}

// ===================== INIT =====================

loadCampaigns();
setInterval(loadCampaigns, 5000);
</script>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h4>Biznesy</h4>

<!-- Pasek akcji (widoczny gdy coś zaznaczone) -->
<div id="actionBar" class="d-none d-flex align-items-center gap-2 mb-2">
    <span id="selectedCount" class="text-muted small"></span>
    <button class="btn btn-sm btn-outline-secondary" onclick="bulkAction('not_interesting')">
        Nie interesuje (ukryj)
    </button>
    <button class="btn btn-sm btn-outline-secondary" onclick="clearSelection()">Odznacz wszystko</button>
</div>

<div class="card">
    <div class="card-header">
        <div class="row g-2 align-items-center">
            <div class="col-auto"><span id="bizCount">Wyszukane biznesy (0)</span></div>
            <div class="col-auto ms-auto">
                <button class="btn btn-sm btn-outline-success" onclick="exportCsv()">
                    Eksport HubSpot CSV
                </button>
            </div>
            <div class="col-md-3">
                <input type="text" id="searchInput" class="form-control form-control-sm"
                       placeholder="Szukaj (nazwa, adres, telefon...)">
            </div>
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select form-select-sm">
                    <option value="">Wszystkie kategorie</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="countryFilter" class="form-select form-select-sm">
                    <option value="">Wszystkie kraje</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="cityFilter" class="form-select form-select-sm">
                    <option value="">Wszystkie miasta</option>
                </select>
            </div>
            <div class="col-auto">
                <select id="websiteFilter" class="form-select form-select-sm">
                    <option value="">Strona: wszystkie</option>
                    <option value="1">Ma stronę</option>
                    <option value="0">Bez strony</option>
                </select>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-striped table-sm table-hover mb-0">
                <thead>
                    <tr>
                        <th style="width:32px">
                            <input type="checkbox" id="checkAll" title="Zaznacz wszystkie">
                        </th>
                        <th class="sortable" data-col="id">#</th>
                        <th class="sortable" data-col="name">Nazwa</th>
                        <th class="sortable" data-col="address">Adres</th>
                        <th class="sortable" data-col="city">Miasto</th>
                        <th class="sortable" data-col="country">Kraj</th>
                        <th class="sortable" data-col="phone">Telefon</th>
                        <th>Strona</th>
                        <th class="sortable" data-col="category">Kategoria</th>
                        <th class="sortable" data-col="category_google">Kategoria Google</th>
                        <th class="sortable" data-col="source_query">Zapytanie</th>
                        <th class="sortable" data-col="created_at">Dodano</th>
                    </tr>
                </thead>
                <tbody id="bizTableBody">
                    <tr><td colspan="12" class="text-center text-muted">Ladowanie...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer">
        <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted" id="pageInfo"></small>
            <div class="btn-group btn-group-sm" id="pagination"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PER_PAGE = 500;
let currentPage = 1;
let debounceTimer = null;
let currentSort = {col: 'created_at', asc: false};

const tsOpts = { allowEmptyOption: true, maxOptions: 5000 };
const tsCategory = new TomSelect('#categoryFilter', tsOpts);
const tsCountry  = new TomSelect('#countryFilter',  tsOpts);
const tsCity     = new TomSelect('#cityFilter',     tsOpts);
tsCategory.on('change', () => loadBusinesses(1));
tsCountry.on('change',  () => loadBusinesses(1));
tsCity.on('change',     () => loadBusinesses(1));

function loadBusinesses(page) {
    currentPage = page || 1;
    const search      = document.getElementById('searchInput').value;
    const cat         = tsCategory.getValue();
    const country     = tsCountry.getValue();
    const city        = tsCity.getValue();
    const hasWebsite  = document.getElementById('websiteFilter').value;
    const params = new URLSearchParams({
        page: currentPage,
        per_page: PER_PAGE,
        sort_col: currentSort.col,
        sort_dir: currentSort.asc ? 'asc' : 'desc',
    });
    if (search)      params.set('search',      search);
    if (cat)         params.set('category',    cat);
    if (country)     params.set('country',     country);
    if (city)        params.set('city',        city);
    if (hasWebsite !== '') params.set('has_website', hasWebsite);

    fetch('/api/businesses?' + params)
        .then(r => r.json())
        .then(data => {
            renderTable(data.businesses);
            renderPagination(data.page, data.pages, data.total);
            updateTomSelect(tsCategory, data.categories, 'Wszystkie kategorie');
            updateTomSelect(tsCountry,  data.countries,  'Wszystkie kraje');
            updateTomSelect(tsCity,     data.cities,     'Wszystkie miasta');
            document.getElementById('bizCount').textContent =
                `Wyszukane biznesy (${data.total})`;
        });
}

function renderTable(businesses) {
    const tbody = document.getElementById('bizTableBody');
    if (!businesses.length) {
        tbody.innerHTML = '<tr><td colspan="12" class="text-center text-muted">Brak danych</td></tr>';
        updateSortIndicators();
        document.getElementById('checkAll').checked = false;
        return;
    }

    tbody.innerHTML = businesses.map(b => {
        return `<tr>
            <td><input type="checkbox" class="biz-check" data-id="${b.id}" onchange="onCheck()"></td>
            <td>${b.id}</td>
            <td>${b.place_id ? `<a href="https://www.google.com/maps/place/?q=place_id:${b.place_id}" target="_blank" rel="noopener">${esc(b.name)}</a>` : esc(b.name)}</td>
            <td>${esc(b.address)}</td>
            <td>${esc(b.city || '')}</td>
            <td>${esc(b.country || '')}</td>
            <td>${esc(b.phone || '')}</td>
            <td>${b.website ? `<a href="${esc(b.website)}" target="_blank">link</a>` : ''}</td>
            <td><small>${esc(b.category || '')}</small></td>
            <td><small>${esc(b.category_google || '')}</small></td>
            <td><small class="text-muted">${esc(b.source_query || '')}</small></td>
            <td><small>${b.created_at || ''}</small></td>
        </tr>`;
    }).join('');

    updateSortIndicators();
    onCheck();
}

// ---- Checkboxy ----

function onCheck() {
    const boxes = document.querySelectorAll('.biz-check');
    const checked = document.querySelectorAll('.biz-check:checked');
    const allBox = document.getElementById('checkAll');
    allBox.checked = boxes.length > 0 && checked.length === boxes.length;
    allBox.indeterminate = checked.length > 0 && checked.length < boxes.length;

    const bar = document.getElementById('actionBar');
    if (checked.length > 0) {
        document.getElementById('selectedCount').textContent = `Zaznaczono: ${checked.length}`;
        bar.classList.remove('d-none');
    } else {
        bar.classList.add('d-none');
    }
}

document.getElementById('checkAll').addEventListener('change', function() {
    document.querySelectorAll('.biz-check').forEach(cb => cb.checked = this.checked);
    onCheck();
});

function clearSelection() {
    document.querySelectorAll('.biz-check').forEach(cb => cb.checked = false);
    document.getElementById('checkAll').checked = false;
    document.getElementById('checkAll').indeterminate = false;
    onCheck();
}

function bulkAction(action) {
    const ids = [...document.querySelectorAll('.biz-check:checked')].map(cb => parseInt(cb.dataset.id));
    if (!ids.length) return;
    fetch('/api/businesses/bulk-action', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids, action}),
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            loadBusinesses(currentPage);
        } else {
            alert('Błąd: ' + (data.error || 'nieznany'));
        }
    });
}

// ---- Sortowanie ----

function updateSortIndicators() {
    document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (th.dataset.col === currentSort.col) {
            th.classList.add(currentSort.asc ? 'sort-asc' : 'sort-desc');
        }
    });
}

document.querySelectorAll('th.sortable').forEach(th => {
    th.style.cursor = 'pointer';
    th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (currentSort.col === col) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.col = col;
            currentSort.asc = true;
        }
        loadBusinesses(1);
    });
});

// ---- Paginacja ----

function renderPagination(page, pages, total) {
    const info = document.getElementById('pageInfo');
    const nav = document.getElementById('pagination');
    info.textContent = `Strona ${page} z ${pages} (${total} wynikow)`;

    if (pages <= 1) { nav.innerHTML = ''; return; }

    let html = '';
    html += `<button class="btn btn-outline-secondary" ${page<=1?'disabled':''} onclick="loadBusinesses(${page-1})">&laquo;</button>`;

    let start = Math.max(1, page - 2);
    let end = Math.min(pages, page + 2);
    for (let i = start; i <= end; i++) {
        html += `<button class="btn btn-outline-secondary ${i===page?'active':''}" onclick="loadBusinesses(${i})">${i}</button>`;
    }

    html += `<button class="btn btn-outline-secondary" ${page>=pages?'disabled':''} onclick="loadBusinesses(${page+1})">&raquo;</button>`;
    nav.innerHTML = html;
}

// ---- TomSelect ----

function updateTomSelect(ts, items, placeholder) {
    const current = ts.getValue();
    ts.clearOptions();
    ts.addOption({value: '', text: placeholder});
    (items || []).forEach(v => { if (v) ts.addOption({value: v, text: v}); });
    const keep = (current && items && items.includes(current)) ? current : '';
    ts.setValue(keep, true);
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function exportCsv() {
    const checkedBoxes = document.querySelectorAll('.biz-check:checked');
    const params = new URLSearchParams();

    if (checkedBoxes.length > 0) {
        params.set('ids', [...checkedBoxes].map(cb => cb.dataset.id).join(','));
    } else {
        const search     = document.getElementById('searchInput').value;
        const cat        = tsCategory.getValue();
        const country    = tsCountry.getValue();
        const city       = tsCity.getValue();
        const hasWebsite = document.getElementById('websiteFilter').value;
        if (search)          params.set('search',      search);
        if (cat)             params.set('category',    cat);
        if (country)         params.set('country',     country);
        if (city)            params.set('city',        city);
        if (hasWebsite !== '') params.set('has_website', hasWebsite);
    }

    window.location.href = '/api/businesses/export?' + params;
}

document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadBusinesses(1), 300);
});

document.getElementById('websiteFilter').addEventListener('change', () => loadBusinesses(1));

loadBusinesses(1);
</script>
{% endblock %}
